<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Trou Perdu</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(160deg,#1e4027,#7a5421);
  color:white;
  text-align:center;
  padding:10px;
}

.card{
  max-width:500px;
  margin:auto;
  background:#1b1b1b;
  border-radius:20px;
  padding:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:white;
}

button:disabled{ background:#333; }

img{
  width:100%;
  margin-top:10px;
  display:none;
  border-radius:10px;
}

#progressBar{height:10px;background:#333;border-radius:10px;margin:10px 0;}
#progress{height:10px;background:#4caf50;width:0%;border-radius:10px;}

#feedback{margin-top:10px;font-weight:bold;}
</style>
</head>

<body>

<div class="card">

<h2>🎉 Quiz Trou Perdu</h2>

<div id="progressBar"><div id="progress"></div></div>

<div id="info"></div>
<div id="question"></div>
<div id="answers"></div>
<div id="feedback"></div>
<img id="photo">
<button id="nextBtn" onclick="nextQuestion()" style="display:none;">Suivant</button>
<div id="result"></div>

</div>

<script>

let q=0, score=0, erreurs=0;
let answered=false;

// QUESTIONS
const quiz = Object.freeze([

Object.freeze({q:"Qu'est-ce qui a le plus changé au TP ?",a:Object.freeze(["Le hangar","Le terrain","Les tentes"]),correct:0,img:"q1.jpg"}),
Object.freeze({q:"Qui a failli tomber de son vélo au TP 2 ?",a:Object.freeze(["maria","LeVan51","Tiaré02","Jeredim"]),correct:0,img:"q4.jpg"}),
Object.freeze({q:"Pourquoi les gendarmes sont venus pendant la T5 ?",a:Object.freeze(["Ils ont eu peur que rippe89 se blesse","Un exercice de crash d’avion","Ce sont des géocacheurs"]),correct:1,img:"q7.jpg"}),
Object.freeze({q:"Qui anime les karaoké ?",a:Object.freeze(["Powerdance et Evann","DJ Max","Léo"]),correct:0,img:"q3.jpg"}),
Object.freeze({q:"Qu'est-ce qui est jaune au Trou Perdu ?",a:Object.freeze(["Les balles de tennis","Jonathan","Les bananes"]),correct:0,img:"q5.jpg"}),
Object.freeze({q:"Qui était Olga au premier TP ?",a:Object.freeze(["Une géocacheuse","Une prostituée","Une espionne"]),correct:1,img:"q6.jpg"}),
Object.freeze({q:"Quels sont les prénoms de rippe89 et Martholex ?",a:Object.freeze(["Caroline et Alexandra","Julie et Sophie","Marie et Claire"]),correct:0,img:"q9.jpg"}),
Object.freeze({q:"Quelle boisson coule en abondance ?",a:Object.freeze(["Coca","Bière","Eau"]),correct:1,img:"q10.jpg"}),
Object.freeze({q:"Qu'est-ce qui s'est envolé en 2025 ?",a:Object.freeze(["Les ballons","Les clés","Les chapeaux"]),correct:0,img:"q11.jpg"}),
Object.freeze({q:"Quelle surprise a fait Laurent en 2025 ?",a:Object.freeze(["Un concert","Un gâteau géant","Un feu d’artifice"]),correct:2,img:"q12.jpg"}),
Object.freeze({q:"Qui a gagné beaucoup d'argent lors des soirées ?",a:Object.freeze(["team nano89200","Olga","Les Lynx"]),correct:0,img:"q13.jpg"}),
Object.freeze({q:"Qui a montré son soutien-gorge ?",a:Object.freeze(["Valou valou","Alcyona","Les Lynx"]),correct:1,img:"q14.jpg"}),
Object.freeze({q:"Qui s'est déguisé en boîte de pop-corn ?",a:Object.freeze(["Guessourilles","Marysmocky","Kakacon"]),correct:0,img:"q15.jpg"}),
Object.freeze({q:"Qui a le plus pédalé lors d'une night au Trou Perdu ?",a:Object.freeze(["Kiwi","Maryphil21","Pikachu"]),correct:0,img:"q16.jpg"}),
Object.freeze({q:"Qui a fait le plus de \"First To Will Attend\" en 2025 ?",a:Object.freeze([,"Bonnechasse","Justnous","Coordinatus"]),correct:1,img:"q17.jpg"}),
Object.freeze({q:"Qui met des doigts dans le c** aux écureuils ?",a:Object.freeze(["cricridamour","Godedroi","Shoot"]),correct:0,img:"q18.jpg"}),
Object.freeze({q:"Qui est le créateur de la cache station service qui servait de l'alcool ?",a:Object.freeze(["wragglers","fina18","Chrisde"]),correct:1,img:"q19.jpg"}),
Object.freeze({q:"Qui sont les brasseurs des TP ?",a:Object.freeze(["Shoot","Fina18 et Chrisde",,"Djesseling"]),correct:1,img:"q20.jpg"}),
Object.freeze({q:"Qui nous a organisé des M&G mémorables ?",a:Object.freeze(["Marcolo","Olga","Koouye"]),correct:2,img:"q21.jpg"}),
Object.freeze({q:"Quelle star est venu au tp ?",a:Object.freeze(["celine dion","signal wish","james bond"]),correct:1,img:"q22.jpg"}),
Object.freeze({q:"Dans un event “Trou Perdu”, le plus important c’est :",a:Object.freeze(["Le nombre de caches trouvées","L’ambiance et la convivialité","Avoir du réseau","les tout"]),correct:3,img:"q23.jpg"}),
Object.freeze({q:"Lors d’un Trou Perdu, tu risques de :",a:Object.freeze(["Manger avec d’autres géocacheurs","Dormir dehors","Faire une cache de nuit","Tout ça à la fois"]),correct:3,img:"q24.jpg"}),
Object.freeze({q:"Qui a pris un bain de balles ?",a:Object.freeze(["Annie","Bruno","Sylvianne","Jean-Paul"]),correct:3,img:"q25.jpg"}),
Object.freeze({q:"Qui est maggyver ?",a:Object.freeze(["Papi Gérard","Jules","Marcel"]),correct:0,img:"q26.jpg"}),
Object.freeze({q:"Quel a ete le thème de déguisement au trou perdu 8 ?",a:Object.freeze(["tu las si non la prehistoire","alice","casade papel"]),correct:1,img:"q27.jpg"})

]);

// INFO
setInterval(()=>{
  document.getElementById("info").innerHTML =
  "Question "+(q+1)+"/"+quiz.length+" | ❌ "+erreurs;
},500);

// LOAD
function loadQuestion(){
  answered=false;

  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
  document.getElementById("photo").style.display="none";

  let c=quiz[q];

  document.getElementById("question").innerHTML=c.q;

  let html="";
  c.a.forEach((r,i)=>{
    html+=`<button onclick="check(${i})">${r}</button>`;
  });
  document.getElementById("answers").innerHTML=html;

  document.getElementById("progress").style.width =
  (q/quiz.length)*100+"%";
}

// CHECK
function check(i){
  if(answered) return;
  answered=true;

  let c=quiz[q];
  let buttons=document.querySelectorAll("#answers button");

  buttons.forEach((b,idx)=>{
    b.disabled=true;
    if(idx===c.correct) b.style.background="#2ecc71";
    else if(idx===i) b.style.background="#e74c3c";
  });

  if(i!==c.correct){
    erreurs++;
    document.getElementById("feedback").innerHTML="❌ Mauvaise réponse";
    setTimeout(loadQuestion,1500);
    return;
  }

  score++;
  confetti({particleCount:30,spread:60});
  document.getElementById("feedback").innerHTML="✔ Bonne réponse";

  let img=document.getElementById("photo");
  img.src=c.img;
  img.style.display="block";

  document.getElementById("nextBtn").style.display="block";
}

// NEXT
function nextQuestion(){
  q++;

  if(q>=quiz.length){
    document.getElementById("question").innerHTML="🏁 FIN";
    document.getElementById("answers").innerHTML="";
    document.getElementById("photo").style.display="none";
    document.getElementById("result").innerHTML=
    "Score : "+score+"/"+quiz.length;
    confetti({particleCount:150,spread:100});
    return;
  }

  loadQuestion();
}

// START
loadQuestion();

</script>

</body>
</html>
