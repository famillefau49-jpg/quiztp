<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Trou Perdu</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(160deg,#1e4027,#7a5421);
  color:white;
  text-align:center;
  padding:10px;
}

.card{
  max-width:500px;
  margin:auto;
  background:#1b1b1b;
  border-radius:20px;
  padding:15px;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:white;
  font-size:15px;
}

button:disabled{ background:#333; }

img{
  width:100%;
  margin-top:10px;
  display:none;
  border-radius:10px;
}

#feedback{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/30/audio_7a3f2b0c2a.mp3?filename=happy-upbeat-ambience-121746.mp3">
</audio>

<div class="card">

<h2>🎉 Quiz Trou Perdu</h2>

<div id="info"></div>

<div id="question"></div>
<div id="answers"></div>

<div id="feedback"></div>

<img id="photo">

<button id="nextBtn" onclick="nextQuestion()" style="display:none;">Suivant</button>

<div id="result"></div>

</div>

<script>

let q = 0;
let score = 0;
let erreurs = 0;
let temps = 0;
let answered = false;

let musicStarted = false;

// musique
document.body.addEventListener("click", ()=>{
  if(!musicStarted){
    let bgm = document.getElementById("bgm");
    bgm.volume = 0.25;
    let playPromise = bgm.play();
    if(playPromise !== undefined){
      playPromise.catch(()=>{});
    }
    musicStarted = true;
  }
},{once:true});

setInterval(()=>{
  document.getElementById("info").innerHTML =
  "Question "+(q+1)+"/"+quiz.length+
  " | ⏱ "+temps+"s | ❌ "+erreurs;
  temps++;
},1000);

// confettis
function miniConfetti(){
  confetti({ particleCount: 20, spread: 50, origin:{y:0.6} });
}

// bonne réponse
function good(){
  miniConfetti();
}

// QUESTIONS
const quiz=[

{q:"En quelle année a eu lieu le 1er Trou Perdu ?",a:["2014","2015","2016"],correct:1,img:"q1.jpg"},
{q:"Quel est le plat emblématique du samedi soir ?",a:["Raclette","Tartiflette","Pizza"],correct:1,img:"q2.jpg"},
{q:"Qui anime les karaoké ?",a:["Powerdance et Evann","DJ Max","Léo"],correct:0,img:"q3.jpg"},
{q:"Qui est la meilleure pâtissière ?",a:["Mamie Lucette","Julie","Sophie"],correct:0,img:"q4.jpg"},
{q:"Qu'est-ce qui est jaune au Trou Perdu ?",a:["Les balles de tennis","Jonathan","Les bananes"],correct:0,img:"q5.jpg"},
{q:"Qui était Olga ?",a:["Une géocacheuse","Une prostituée","Une espionne"],correct:1,img:"q6.jpg"},
{q:"Qui a fait le gâteau de Papi Gérard ?",a:["Océane","Julie","Louis"],correct:0,img:"q7.jpg"},
{q:"Qu'ont planté les géocacheurs ?",a:["Carottes","Patates","Arbres"],correct:1,img:"q8.jpg"},
{q:"Prénom de rippe89 et Martholex ?",a:["Caroline et Alexandra","Julie et Sophie","Marie et Claire"],correct:0,img:"q9.jpg"},
{q:"Quelle boisson coule en abondance ?",a:["Coca","Bière","Eau"],correct:1,img:"q10.jpg"},
{q:"Qu'est-ce qui s'est envolé en 2025 ?",a:["Les ballons","Les clés","Les chapeaux"],correct:0,img:"q11.jpg"},
{q:"Quelle surprise a fait Laurent ?",a:["Un feu d’artifice","Un concert","Un gâteau géant"],correct:0,img:"q12.jpg"},
{q:"Qui a gagné beaucoup d'argent ?",a:["teamnano89200","Olga","Les Lynx"],correct:0,img:"q13.jpg"},
{q:"Qui a marqué les esprits ?",a:["Alcyona","Valou valou","Les Lynx"],correct:0,img:"q14.jpg"},
{q:"Qui s'est déguisé en pop-corn ?",a:["Guessourilles","Marysmocky","Kakacon"],correct:0,img:"q15.jpg"},
{q:"Qui a pédalé le plus ?",a:["Maryphil21","Kiwi","Pikachu"],correct:0,img:"q16.jpg"},
{q:"First To Will Attend 2025 ?",a:["Justnous","Bonnechasse","Coordinatus"],correct:0,img:"q17.jpg"},
{q:"Doigts écureuils ?",a:["Cricridamour"","Godedroi","Shoot"],correct:0,img:"q18.jpg"},
{q:"Station service ?",a:["shoot","fina18","Chrisde"],correct:1,img:"q19.jpg"},
{q:"Brasseurs ?",a:["Fina18 et Chrisde","Shoot","Djesseling"],correct:0,img:"q20.jpg"},
{q:"M&G mémorables ?",a:["Marcolo","Olga","Koouye"],correct:2,img:"q21.jpg"}

];

function loadQuestion(){
  answered=false;
  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").style.display="none";

  let img=document.getElementById("photo");
  img.style.display="none";
  img.src="";

  let c=quiz[q];
  document.getElementById("question").innerHTML=c.q;

  let html="";
  c.a.forEach((r,i)=>{
    html+=`<button onclick="check(${i})">${r}</button>`;
  });

  document.getElementById("answers").innerHTML=html;
}

function check(i){
  if(answered) return;
  answered=true;

  let c=quiz[q];
  document.querySelectorAll("#answers button").forEach(b=>b.disabled=true);

  if(i!==c.correct){
    erreurs++;
    document.getElementById("feedback").innerHTML="❌ Mauvaise réponse";
    document.getElementById("nextBtn").style.display="block";
    return;
  }

  score++;
  good();

  document.getElementById("feedback").innerHTML="✔ Bonne réponse";

  let img=document.getElementById("photo");
  img.src=c.img;
  img.style.display="block";

  document.getElementById("nextBtn").style.display="block";
}

function nextQuestion(){
  q++;

  if(q>=quiz.length){

    let code="ECHEC";
    if(score>=9) code="LYNX1940";
    else if(score>=7) code="RESISTANCE";

    document.getElementById("question").innerHTML="🏁 FIN DU QUIZ";
    document.getElementById("answers").innerHTML="";
    document.getElementById("photo").style.display="none";

    document.getElementById("result").innerHTML=
    "Score : "+score+"/"+quiz.length;

    confetti({particleCount:100,spread:80});
    return;
  }

  loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
